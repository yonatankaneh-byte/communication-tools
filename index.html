        function toggleLang() {
            currentLang = currentLang === 'he' ? 'en' : 'he';
            document.documentElement.dir = currentLang === 'he' ? 'rtl' : 'ltr';
            document.documentElement.lang = currentLang;

        function switchTab(tab) {
            document.getElementById('tab-personal').className = 'flex-1 py-4 px-3 md:px-6 font-bold text-sm md:text-lg hover:bg-gray-50 transition-all';
            document.getElementById('tab-group').className = 'flex-1 py-4 px-3 md:px-6 font-bold text-sm md:text-lg hover:bg-gray-50 transition-all';
            document.getElementById('tab-' + tab).classList.add('tab-active');
            
            document.getElementById('personal-tool').classList.toggle('hidden', tab !== 'personal');
            document.getElementById('group-tool').classList.toggle('hidden', tab !== 'group');
        }

        function setPersonalMode(mode) {
            personalMode = mode;
            document.getElementById('btn-mine').className = mode === 'mine' 
                ? 'p-4 md:p-6 rounded-xl border-2 border-indigo-600 bg-indigo-50 text-right transition-all'
                : 'p-4 md:p-6 rounded-xl border-2 border-gray-300 text-right hover:border-indigo-300 transition-all';

                ? 'p-4 md:p-6 rounded-xl border-2 border-indigo-600 bg-indigo-50 text-right transition-all'
                : 'p-4 md:p-6 rounded-xl border-2 border-gray-300 text-right hover:border-indigo-300 transition-all';
            updateTexts();
        }

        function setContext(ctx) {
            currentContext = ctx;
            document.querySelectorAll('.ctx-btn').forEach(b => b.classList.remove('active-ctx'));
            event.target.classList.add('active-ctx');
        }

        function setAge(age) {
            currentAge = age;
            document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('active-age'));
            event.target.classList.add('active-age');
        }

        function addParticipant() {
            if (participants.length < 5) {
                participants.push({id: Date.now(), name: ''});
                renderParticipants();
            }
        }

        function removeParticipant(id) {
            if (participants.length > 2) {
                participants = participants.filter(p => p.id !== id);
                renderParticipants();
            }
        }

        function updateParticipant(id, name) {
            participants = participants.map(p => p.id === id ? {...p, name} : p);
        }

        function renderParticipants() {
            const colors = ['bg-blue-500', 'bg-green-500', 'bg-purple-500', 'bg-orange-500', 'bg-pink-500'];
            const html = participants.map((p, i) => `
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full ${colors[i]} flex items-center justify-center text-white font-bold flex-shrink-0">${i+1}</div>
                    <input value="${p.name}" oninput="updateParticipant(${p.id}, this.value)" placeholder="${t('participantPlaceholder')} ${i+1}" class="flex-1 p-3 text-sm md:text-base border-2 border-gray-300 rounded-xl focus:border-indigo-600 focus:outline-none">
                    ${participants.length > 2 ? `<button onclick="removeParticipant(${p.id})" class="text-red-400 hover:text-red-600 text-xl">✕</button>` : ''}
                </div>
            `).join('');
            document.getElementById('participantsList').innerHTML = html;
        }

        // ===== API CALL =====
        async function callAPI(prompt) {
            if (API_KEY === 'YOUR_API_KEY_HERE') {
                throw new Error(t('errorNoApi'));
            }

            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': API_KEY,
                    'anthropic-version': '2023-06-01'
                },
                body: JSON.stringify({
                    model: 'claude-sonnet-4-20250514',
                    max_tokens: 3000,
                    messages: [{ role: 'user', content: prompt }]
                })
            });

            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error?.message || 'API Error');
            }

            const data = await response.json();
            const text = data.content[0].text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
            return JSON.parse(text);
        }

                    senior: currentLang === 'he' ? 'דור מבוגר' : 'senior'
                };

                const prompt = currentLang === 'he'
                    ? `נתח טקסט בעברית. החזר JSON בלבד.
הקשר: ${contextMap[currentContext]}
גיל: ${ageMap[currentAge]}
טקסט: "${text}"
זהה דגלים אדומים: אלימות, שתלטנות, מניפולציה.
JSON:
{"understanding":"הסבר","tone":"טון","clarity":5,"red_flags":[{"type":"סוג","quote":"ציטוט","explanation":"הסבר","severity":"mild/moderate/severe"}],"emotions_detected":["רגש"],"improved_version":"טקסט מתוקן","how_to_address":"המלצות אם יש דגלים"}`
                    : `Analyze text in English. Return JSON only.
Context: ${contextMap[currentContext]}
Age: ${ageMap[currentAge]}
Text: "${text}"
Detect red flags: abuse, control, manipulation.
JSON:
{"understanding":"explanation","tone":"tone","clarity":5,"red_flags":[{"type":"type","quote":"quote","explanation":"explanation","severity":"mild/moderate/severe"}],"emotions_detected":["emotion"],"improved_version":"improved text","how_to_address":"recommendations if flags"}`;

                const analysis = await callAPI(personalMode === 'mine' ? prompt : prompt.replace('הסבר', 'מה השולח אומר').replace('explanation', 'what sender says'));
                displayPersonalResults(analysis);
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.textContent = t('personalAnalyzeBtn');
                btn.disabled = false;
            }
        }

        function displayPersonalResults(a) {
            let html = `<h2 class="text-xl font-bold text-gray-800 pb-4 border-b-2 border-indigo-100">✅ ${t('results')}</h2>`;
            
            // Red flags
            if (a.red_flags && a.red_flags.length > 0) {
                html += `<div class="bg-red-100 rounded-xl p-5 border-4 border-red-500">
                    <h3 class="text-xl font-bold text-red-900 mb-4">🚨 ${t('redFlagsTitle')}</h3>`;
                a.red_flags.forEach(f => {
                    const sev = f.severity === 'severe' ? t('severitySevere') : f.severity === 'moderate' ? t('severityModerate') : t('severityMild');
                    const sevClass = f.severity === 'severe' ? 'bg-red-600' : f.severity === 'moderate' ? 'bg-orange-500' : 'bg-yellow-400';
                    html += `<div class="bg-white p-4 rounded-lg mb-3 border-l-4 border-red-600">
                        <h4 class="text-lg font-bold text-red-800 mb-2">🚩 ${f.type}</h4>
                        <span class="px-3 py-1 rounded-full text-sm font-bold text-white ${sevClass}">${sev}</span>
                        <div class="bg-red-50 p-3 my-2 rounded border border-red-200">
                            <p class="text-red-900 font-semibold">"${f.quote}"</p>
                        </div>
                        <p class="text-gray-800">${f.explanation}</p>
                    </div>`;
                });
                if (a.how_to_address) {
                    html += `<div class="bg-green-50 p-4 rounded-lg mt-3 border-2 border-green-400">
                        <h4 class="font-bold text-green-900 mb-2">💡 ${t('howToRespond')}</h4>
                        <p class="text-green-900">${a.how_to_address}</p>
                    </div>`;
                }
                html += '</div>';
            }

            // Understanding/Main message
            if (a.understanding || a.main_message) {
                html += `<div class="bg-blue-50 rounded-xl p-4">
                    <h3 class="font-bold text-gray-800 mb-2">💡 ${personalMode === 'mine' ? t('understanding') : t('mainMessage')}</h3>
                    <p class="text-gray-700">${a.understanding || a.main_message}</p>
                </div>`;
            }

            // Tone
            if (a.tone) {
                html += `<div class="bg-purple-50 rounded-xl p-4">
                    <h3 class="font-bold text-gray-800 mb-2">🎭 ${t('tone')}</h3>
                    <p class="text-gray-700">${a.tone}</p>
                </div>`;
            }

            // Emotions
            if (a.emotions_detected && a.emotions_detected.length > 0) {
                html += `<div class="bg-pink-50 rounded-xl p-4">
                    <h3 class="font-bold text-gray-800 mb-2">❤️ ${t('emotions')}</h3>
                    <div class="flex flex-wrap gap-2">`;
                a.emotions_detected.forEach(e => {
                    html += `<span class="bg-pink-200 text-pink-800 px-3 py-1 rounded-full font-semibold">${e}</span>`;
                });
                html += '</div></div>';
            }

            // Clarity
            if (a.clarity) {
                html += `<div class="bg-green-50 rounded-xl p-4">
                    <h3 class="font-bold text-gray-800 mb-2">📊 ${t('clarity')}</h3>
                    <div class="flex gap-1">`;
                for (let i = 1; i <= 5; i++) {
                    html += `<span class="text-2xl">${i <= a.clarity ? '⭐' : '☆'}</span>`;
                }
                html += `<span class="mr-2">(${a.clarity}/5)</span></div></div>`;
            }

            // Improved version
            if (a.improved_version) {
                html += `<div class="bg-green-50 rounded-xl p-4 border-2 border-green-200">
                    <h3 class="font-bold text-gray-800 mb-3">✨ ${t('improvedVersion')}</h3>
                    <p class="bg-white p-4 rounded-lg text-gray-800">${a.improved_version}</p>
                </div>`;
            }

            // Suggested response
            if (a.suggested_response) {
                html += `<div class="bg-green-50 rounded-xl p-4 border-2 border-green-200">
                    <h3 class="font-bold text-gray-800 mb-3">✍️ ${t('suggestedResponse')}</h3>
                    <p class="bg-white p-4 rounded-lg text-gray-800">${a.suggested_response}</p>
                </div>`;
            }

            html += `<button onclick="document.getElementById('personalText').value='';document.getElementById('personalResults').classList.add('hidden')" class="w-full bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 rounded-xl">${t('analyzeAnother')}</button>`;
            
            document.getElementById('personalResults').innerHTML = html;
            document.getElementById('personalResults').classList.remove('hidden');
        }

        // ===== GROUP ANALYSIS =====
        async function analyzeGroup() {
            const text = document.getElementById('groupText').value.trim();
            const named = participants.filter(p => p.name.trim());
            
            if (!text) {
                alert(t('errorNoText'));
                return;
            }
            if (named.length < 2) {
                alert(t('errorNoParticipants'));
                return;
            }

            const btn = document.getElementById('analyzeGroupBtn');
            btn.textContent = t('groupAnalyzing');
            btn.disabled = true;

            try {
                const names = named.map(p => p.name).join(', ');
                const prompt = currentLang === 'he'
                    ? `נתח שיחה קבוצתית. החזר JSON בלבד.
משתתפים: ${names}
שיחה: "${text}"
JSON:
{"summary":"סיכום","overall_dynamic":"דינמיקה","power_balance":"איזון כוחות","group_health":"בריאות 1-10","participants":[{"name":"שם","role":"תפקיד","tone":"טון","emotions":["רגש"],"behavior_patterns":"דפוסים","influence_level":"גבוה/בינוני/נמוך","red_flags":["דגל"]}],"relationships":[{"between":["שם1","שם2"],"dynamic":"דינמיקה","tension_level":"high/medium/low/none"}],"red_flags":[{"type":"סוג","who":"מי","quote":"ציטוט","explanation":"הסבר","severity":"mild/moderate/severe"}],"conflicts":[{"between":["שם1","שם2"],"about":"נושא","resolved":false,"suggestion":"פתרון"}],"positive_moments":["רגע"],"recommendations":["המלצה"]}`
                    : `Analyze group chat. Return JSON only.
Participants: ${names}
Chat: "${text}"
JSON:
{"summary":"summary","overall_dynamic":"dynamic","power_balance":"balance","group_health":"health 1-10","participants":[{"name":"name","role":"role","tone":"tone","emotions":["emotion"],"behavior_patterns":"patterns","influence_level":"high/medium/low","red_flags":["flag"]}],"relationships":[{"between":["name1","name2"],"dynamic":"dynamic","tension_level":"high/medium/low/none"}],"red_flags":[{"type":"type","who":"who","quote":"quote","explanation":"explanation","severity":"mild/moderate/severe"}],"conflicts":[{"between":["name1","name2"],"about":"topic","resolved":false,"suggestion":"solution"}],"positive_moments":["moment"],"recommendations":["recommendation"]}`;

                const analysis = await callAPI(prompt);
                displayGroupResults(analysis);
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.textContent = t('groupAnalyzeBtn');
                btn.disabled = false;
            }
        }

        function displayGroupResults(a) {
            let html = `<h2 class="text-xl font-bold text-gray-800 pb-4 border-b-2 border-indigo-100">✅ ${t('results')}</h2>`;
            
            // Summary
            if (a.summary) {
                html += `<div class="bg-indigo-50 rounded-xl p-4">
                    <h3 class="font-bold text-indigo-900 mb-2">📋 ${t('summary')}</h3>
                    <p class="text-gray-800">${a.summary}</p>
                </div>`;
            }

            // Power & Health
            html += '<div class="grid md:grid-cols-2 gap-4">';
            if (a.power_balance) {
                html += `<div class="bg-blue-50 rounded-xl p-4">
                    <h3 class="font-bold text-blue-900 mb-2">⚖️ ${t('powerBalance')}</h3>
                    <p class="text-gray-700">${a.power_balance}</p>
                </div>`;
            }
            if (a.group_health) {
                html += `<div class="bg-green-50 rounded-xl p-4">
                    <h3 class="font-bold text-green-900 mb-2">💚 ${t('groupHealth')}</h3>
                    <p class="text-gray-700">${a.group_health}</p>
                </div>`;
            }
            html += '</div>';

            // Red flags
            if (a.red_flags && a.red_flags.length > 0) {
                html += `<div class="bg-red-100 rounded-xl p-5 border-4 border-red-500">
                    <h3 class="text-xl font-bold text-red-900 mb-4">🚨 ${t('redFlagsTitle')}</h3>`;
                a.red_flags.forEach(f => {
                    const sev = f.severity === 'severe' ? t('severitySevere') : f.severity === 'moderate' ? t('severityModerate') : t('severityMild');
                    const sevClass = f.severity === 'severe' ? 'bg-red-600' : f.severity === 'moderate' ? 'bg-orange-500' : 'bg-yellow-400';
                    html += `<div class="bg-white p-4 rounded-lg mb-3">
                        <h4 class="text-lg font-bold text-red-800">🚩 ${f.type}</h4>
                        <span class="px-3 py-1 rounded-full text-sm font-bold text-white ${sevClass}">${sev}</span>
                        <span class="px-3 py-1 rounded-full text-sm font-bold bg-gray-700 text-white mr-2">${f.who}</span>
                        <div class="bg-red-50 p-3 my-2 rounded"><p class="text-red-900 font-semibold">"${f.quote}"</p></div>
                        <p class="text-gray-800">${f.explanation}</p>
                    </div>`;
                });
                html += '</div>';
            }

            html += `<button onclick="document.getElementById('groupText').value='';document.getElementById('groupResults').classList.add('hidden')" class="w-full bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 rounded-xl">${t('analyzeAnother')}</button>`;
            
            document.getElementById('groupResults').innerHTML = html;
            document.getElementById('groupResults').classList.remove('hidden');
        }

        // ===== INIT =====
        renderParticipants();
        updateTexts();
    </script>
</body>
</html>
